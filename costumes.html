<nav class="tabs">
  <a class="tab" href="index.html"><span class="tab-icon">🗺️</span>Dashboard</a>
  <a class="tab" href="characters.html"><span class="tab-icon">🌟</span>Characters</a>
  <a class="tab" href="attractions.html"><span class="tab-icon">🏗️</span>Attractions</a>
  <a class="tab active" href="costumes.html"><span class="tab-icon">👗</span>Costumes</a>

</nav>

  <!-- Main Content -->
  <main>
    <!-- Costumes -->
    <div id="tab-costumes" class="section active">
       <div class="card" style="margin-bottom:12px;">
    <div class="card-title">👗 Costumes</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
      <input id="costume-search" type="text" placeholder="🔍 Search costume or character..." oninput="renderCostumes()"
        style="flex:1;min-width:180px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;">
      <select id="costume-coll-filter" onchange="renderCostumes()"
        style="padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:12px;">
        <option value="">All Collections</option>
      </select>
      <button class="filter-btn active" onclick="setCostumeFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setCostumeFilter('owned',this)">✅ Owned</button>
      <button class="filter-btn" onclick="setCostumeFilter('missing',this)">❌ Missing</button>
    </div>
    <div id="costume-progress" style="margin-bottom:12px;font-size:12px;color:var(--muted);"></div>
    <div id="costume-list"></div>
  </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>DMK Helper © 2026</p>
  </footer>
   <script src="data.js"></script>
  <script src="main.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Characters — DMK Helper</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="characters">
  <!-- Header -->
  <header>
    <h1>DMK Helper</h1>
  </header>
  <!-- Navigation -->
  <nav class="tabs">
    <a class="tab" href="index.html"><span class="tab-icon">🗺️</span>Dashboard</a>
    <a class="tab active" href="characters.html"><span class="tab-icon">🌟</span>Characters</a>
    <a class="tab" href="attractions.html"><span class="tab-icon">🏗️</span>Attractions</a>
    <a class="tab" href="costumes.html"><span class="tab-icon">👗</span>Costumes</a>
    <a class="tab" href="tokens.html"><span class="tab-icon">🪙</span>Tokens</a>
    <a class="tab" href="floats.html"><span class="tab-icon">🎡</span>Floats</a>
    <a class="tab" href="concessions.html"><span class="tab-icon">🍦</span>Concessions</a>
    <a class="tab" href="enchantments.html"><span class="tab-icon">⚡</span>Enchantments</a>
    <a class="tab" href="campaign.html"><span class="tab-icon">📖</span>Campaign</a>
    <a class="tab" href="decorations.html"><span class="tab-icon">🎀</span>Decorations</a>
    <a class="tab" href="tips.html"><span class="tab-icon">💡</span>F2P Tips</a>
  </nav>


  <!-- Main Content -->
  <main>
    <!-- CHARACTERS -->
    <div id="tab-characters" class="section active">
      <div class="card" style="padding:12px 16px;">
        <input type="text" id="char-search-input" placeholder="🔍 Search characters..." autocomplete="off" oninput="renderCharsDebounced()" style="width:100%;">
      </div>

      <!-- Filters -->
      <div class="char-filters" style="flex-wrap:wrap;align-items:center;">
        <button class="filter-btn active" onclick="filterChars('all', this)">All</button>
        <button class="filter-btn" onclick="filterChars('welcomed', this)">Welcomed</button>
        <button class="filter-btn" onclick="filterChars('not-welcomed', this)">Not Welcomed</button>
        <button class="filter-btn" onclick="filterChars('wishlist', this)">⭐ Wishlist</button>
        <button class="filter-btn" onclick="filterChars('needs-level', this)">⬆️ Needs Level Up</button>
        <button class="filter-btn" onclick="filterChars('maxed', this)">Max Level</button>
        <button class="filter-btn" onclick="filterChars('storyline', this)">Storyline</button>
        <button class="filter-btn" onclick="filterChars('event', this)">Event</button>
        <button class="filter-btn" onclick="filterChars('premium', this)">Premium</button>
        <select id="collection-filter" onchange="renderChars()"
          style="font-size:11px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;height:28px;">
          <option value="">All Collections</option>
        </select>
      </div>

      <!-- Character Grid -->
      <div class="scroll-y">
        <div class="char-grid" id="char-grid"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>DMK Helper © 2026</p>
  </footer>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>

</html>

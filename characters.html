<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Characters — DMK Helper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>DMK Helper</h1>
    <!-- Navigation -->
    <nav class="tabs">
  <a class="tab" href="index.html"><span class="tab-icon">🗺️</span>Dashboard</a>
  <a class="tab active" href="characters.html"><span class="tab-icon">🌟</span>Characters</a>
  <a class="tab" href="attractions.html"><span class="tab-icon">🏗️</span>Attractions</a>
  <a class="tab" href="costumes.html"><span class="tab-icon">👗</span>Costumes</a>
  <a class="tab" href="tokens.html"><span class="tab-icon">🪙</span>Tokens</a>
  <a class="tab" href="floats.html"><span class="tab-icon">🎡</span>Floats</a>
  <a class="tab" href="concessions.html"><span class="tab-icon">🍦</span>Concessions</a>
  <a class="tab" href="enchantments.html"><span class="tab-icon">⚡</span>Enchantments</a>
  <a class="tab" href="campaign.html"><span class="tab-icon">📖</span>Campaign</a>
  <a class="tab" href="decorations.html"><span class="tab-icon">🎀</span>Decorations</a>
  <a class="tab" href="daily.html"><span class="tab-icon">📅</span>Daily</a>
  <a class="tab" href="tips.html"><span class="tab-icon">💡</span>F2P Tips</a>
</nav>
  </header>

  <!-- Main Content -->
  <main>
    <!-- CHARACTERS -->
    <div id="tab-characters" class="section active">
      <div class="card" style="padding:12px 16px;">
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="char-search-input" placeholder="🔍 Search characters..." autocomplete="off" oninput="filterCharsBySearch()" style="flex:1;min-width:0;">
          <button class="btn-sm" onclick="toggleAddForm()" id="add-char-toggle" style="white-space:nowrap;background:var(--card2);border:1px solid var(--border);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text);">＋ New Character</button>
        </div>

        <!-- Collapsed add form -->
        <div id="add-char-form" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Add a character not yet in the database (e.g. newly released):</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <input type="text" id="new-char-name" placeholder="Character name" style="font-size:13px;">
            <div style="position:relative;">
              <input type="text" id="new-char-collection" placeholder="Collection (e.g. Encanto)" autocomplete="off"
                style="font-size:13px;width:100%;box-sizing:border-box;"
                oninput="showCollSuggestions()" onfocus="showCollSuggestions()">
              <div id="coll-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;z-index:60;margin-top:2px;box-shadow:0 6px 20px rgba(0,0,0,0.5);"></div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:10px;">
            <input type="text" id="new-char-emoji" placeholder="Emoji 🎪" style="font-size:13px;">
            <select id="new-char-type" style="font-size:13px;">
              <option value="s">📖 Storyline</option>
              <option value="p">💎 Premium</option>
              <option value="e">🎉 Event</option>
            </select>
            <select id="new-char-level" style="font-size:13px;">
              <option value="0">Not Welcomed</option>
              <option value="1">Level 1</option>
              <option value="2">Level 2</option>
              <option value="3">Level 3</option>
              <option value="4">Level 4</option>
              <option value="5">Level 5</option>
              <option value="6">Level 6</option>
              <option value="7">Level 7</option>
              <option value="8">Level 8</option>
              <option value="9">Level 9</option>
              <option value="10">Level 10 (Max)</option>
            </select>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn-add" onclick="addCustomChar()" style="flex:1;">✨ Add to Kingdom</button>
            <span id="add-char-error" style="font-size:11px;color:#e87;display:none;"></span>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="char-filters" style="flex-wrap:wrap;align-items:center;">
        <button class="filter-btn active" onclick="filterChars('all', this)">All</button>
        <button class="filter-btn" onclick="filterChars('welcomed', this)">Welcomed</button>
        <button class="filter-btn" onclick="filterChars('not-welcomed', this)">Not Welcomed</button>
        <button class="filter-btn" onclick="filterChars('wishlist', this)">⭐ Wishlist</button>
        <button class="filter-btn" onclick="filterChars('needs-level', this)">⬆️ Needs Level Up</button>
        <button class="filter-btn" onclick="filterChars('maxed', this)">Max Level</button>
        <button class="filter-btn" onclick="filterChars('storyline', this)">Storyline</button>
        <button class="filter-btn" onclick="filterChars('event', this)">Event</button>
        <button class="filter-btn" onclick="filterChars('premium', this)">Premium</button>
        <select id="collection-filter" onchange="filterChars('all', document.querySelector('.filter-btn.active')); renderChars();"
          style="font-size:11px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;height:28px;">
          <option value="">All Collections</option>
        </select>
      </div>

      <!-- Character Grid -->
      <div class="scroll-y">
        <div class="char-grid" id="char-grid"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>DMK Helper © 2026</p>
  </footer>
   <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>

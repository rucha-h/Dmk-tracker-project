  <!-- Main Content -->
  <main>
    <!-- EVENTS -->
    <div id="tab-events" class="section active">
      <div id="events-list"></div>
    <div class="card" style="margin-top:4px;">
      <div class="card-title"><span class="icon">➕</span>Track an Event</div>
      <div class="form-row">
        <input type="text" id="event-name-input" placeholder="Event name">
        <select id="event-status-input">
          <option value="active">🟢 Active Now</option>
          <option value="upcoming">🟡 Upcoming</option>
          <option value="past">⚫ Past</option>
        </select>
      </div>
      <div class="form-row trio">
        <input type="number" id="event-curr-input" placeholder="Currency earned" min="0">
        <input type="number" id="event-goal-input" placeholder="Currency goal" min="0">
        <input type="number" id="event-days-input" placeholder="Days left" min="0">
      </div>
      <button class="btn-add" onclick="addEvent()">✨ Track Event</button>
    </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>

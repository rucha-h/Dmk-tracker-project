<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<body data-page="concessions">
  <!-- Header -->
  <header>
    <h1>DMK Helper</h1>
  </header>

  <!-- Navigation -->
<nav class="tabs">
  <a class="tab" href="index.html"><span class="tab-icon">🗺️</span>Dashboard</a>
  <a class="tab" href="characters.html"><span class="tab-icon">🌟</span>Characters</a>
  <a class="tab" href="attractions.html"><span class="tab-icon">🏗️</span>Attractions</a>
  <a class="tab" href="costumes.html"><span class="tab-icon">👗</span>Costumes</a>
  <a class="tab" href="tokens.html"><span class="tab-icon">🪙</span>Tokens</a>
  <a class="tab" href="floats.html"><span class="tab-icon">🎡</span>Floats</a>
  <a class="tab active" href="concessions.html"><span class="tab-icon">🍦</span>Concessions</a>
  <a class="tab" href="enchantments.html"><span class="tab-icon">⚡</span>Enchantments</a>
  <a class="tab" href="campaign.html"><span class="tab-icon">📖</span>Campaign</a>
  <a class="tab" href="decorations.html"><span class="tab-icon">🎀</span>Decorations</a>
  <a class="tab" href="tips.html"><span class="tab-icon">💡</span>F2P Tips</a>
</nav>

  <!-- Main Content -->
  <main>
   <!-- CONCESSIONS -->
    <div id="tab-concessions" class="section active">
   <div class="card" style="padding:12px 16px;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="con-search" placeholder="🔍 Search concessions..." autocomplete="off"
          style="flex:1;min-width:160px;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;"
          oninput="renderConcessions()">
        <select id="con-cat-filter" onchange="renderConcessions()"
          style="background:var(--input);border:1px solid var(--border);color:var(--text);font-size:12px;border-radius:8px;padding:4px 8px;cursor:pointer;height:28px;">
          <option value="">All Categories</option>
          <option value="Food Stand">🍔 Food</option>
          <option value="Drink Stand">🥤 Drink</option>
          <option value="Headwear Stand">🎩 Headwear</option>
          <option value="Souvenir Stand">🎁 Souvenir</option>
        </select>
        <select id="con-coll-filter" onchange="renderConcessions()"
          style="background:var(--input);border:1px solid var(--border);color:var(--text);font-size:12px;border-radius:8px;padding:4px 8px;cursor:pointer;height:28px;max-width:180px;">
          <option value="">All Collections</option>
        </select>
        <select id="con-sort" onchange="renderConcessions()"
          style="background:var(--input);border:1px solid var(--border);color:var(--text);font-size:12px;border-radius:8px;padding:4px 8px;cursor:pointer;height:28px;">
          <option value="name">A-Z</option>
          <option value="magic_per_hour">Magic/hr ↓</option>
          <option value="collection">Collection</option>
        </select>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="filterConOwned('all')" id="con-btn-all" class="filter-btn active" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;">All</button>
        <button onclick="filterConOwned('owned')" id="con-btn-owned" class="filter-btn" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;">✅ Owned</button>
        <button onclick="filterConOwned('missing')" id="con-btn-missing" class="filter-btn" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;">○ Missing</button>
        <span id="con-count" style="margin-left:auto;font-size:11px;color:var(--muted);align-self:center;"></span>
      </div>
    </div>
    <div class="scroll-y" style="max-height:none;">
      <div id="con-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:4px 0;"></div>
    </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>DMK Helper © 2026</p>
  </footer>
   <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
